# ============================================================
# Application
# ============================================================
spring.application.name=notification-system
server.port=${PORT:8080}

# ============================================================
# PostgreSQL DataSource ? using Railway injected variables
# ============================================================
spring.datasource.url=jdbc:postgresql://${postgres.railway.internal}:${5432}/${railway}
spring.datasource.username=${postgres}
spring.datasource.password=${wIGBMGSIEEhYMuYFECKDrbofUWzhcsZL}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# Logging
# ============================================================
logging.level.com.saas.notification=INFO
logging.level.org.springframework.web=WARN